name: Task
description: A unit of work. Usually a sub-issue of a Feature; may stand alone (chore / spike).
title: "[Task] "
type: Task
labels: []
body:
  - type: markdown
    attributes:
      value: |
        A **Task** is granular work. Attach it as a **sub-issue** of its Feature
        (from the Feature → Sub-issues → Add). Standalone tasks are fine — for upkeep add
        the `chore` label, for research add the `spike` label, and give it an `area:*`
        label so it still appears on the roadmap.
  - type: textarea
    id: what
    attributes:
      label: What needs doing
      placeholder: Concrete, single-PR-sized work.
    validations:
      required: true
  - type: input
    id: parent
    attributes:
      label: Parent feature
      description: Issue number of the Feature this belongs to (leave empty if standalone).
      placeholder: "#300"
    validations:
      required: false
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      description: Plain task, or chore/spike (also add the matching label).
      options:
        - task
        - chore
        - spike
    validations:
      required: false
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      placeholder: |
        - [ ] ...
    validations:
      required: false
