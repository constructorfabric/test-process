# Derives Target date from the Release field: Release "YY.MM" -> Target date = last day of that month.
# Target date is therefore a DERIVED field -- don't set it by hand, this bot owns it.
# No workflow event fires on project-field edits, so this runs on a schedule (+ manual).
name: Sync Target date from Release

on:
  schedule:
    - cron: "0 4 * * *"     # daily 04:00 UTC (before overdue/commitment-risk sweeps)
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}   # reads + writes project fields
          script: |
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { ...context.repo, state: "open", per_page: 100 }
            );

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const data = await github.graphql(`
                query($id:ID!){
                  node(id:$id){ ... on Issue {
                    projectItems(first:20){ nodes {
                      id
                      project { id fields(first:50){ nodes {
                        ... on ProjectV2Field { id name }
                        ... on ProjectV2SingleSelectField { id name }
                      } } }
                      fieldValues(first:50){ nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue { name field { ... on ProjectV2FieldCommon { name } } }
                        ... on ProjectV2ItemFieldDateValue { date field { ... on ProjectV2FieldCommon { name } } }
                      } }
                    } }
                  } }
                }`, { id: issue.node_id });

              const items = (data.node && data.node.projectItems && data.node.projectItems.nodes) || [];

              for (const item of items) {
                const proj = item.project;
                const targetField = proj.fields.nodes.find(f => f && f.name === "Target date");
                if (!targetField) continue;

                let release = null, currentTarget = null;
                for (const v of item.fieldValues.nodes) {
                  if (!v || !v.field) continue;
                  if (v.field.name === "Release" && v.name) release = v.name;
                  if (v.field.name === "Target date" && v.date) currentTarget = v.date.slice(0, 10);
                }

                const m = release && release.match(/^(\d{2})\.(\d{2})$/);
                if (!m) continue;   // no release (or not YY.MM) -> leave Target date alone

                // last day of month MM in year 20YY (Date.UTC(y, monthIndex+1, 0) = last day of month monthIndex+1)
                const iso = new Date(Date.UTC(2000 + parseInt(m[1], 10), parseInt(m[2], 10), 0)).toISOString().slice(0, 10);
                if (currentTarget === iso) continue;   // already correct

                await github.graphql(`
                  mutation($p:ID!,$i:ID!,$f:ID!,$d:Date!){
                    updateProjectV2ItemFieldValue(input:{
                      projectId:$p, itemId:$i, fieldId:$f, value:{ date:$d }
                    }){ clientMutationId }
                  }`, { p: proj.id, i: item.id, f: targetField.id, d: iso });
              }
            }
