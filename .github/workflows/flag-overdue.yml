# Flags overdue issues: the milestone (YY.MM) due date has passed but the issue is still open.
# The milestone is derived from the Release field by sync-milestone-from-release.yml, so this is
# back to reading the native milestone due date. Labels as github-actions[bot] (default token).
name: Flag overdue issues

on:
  schedule:
    - cron: "0 6 * * *"     # daily 06:00 UTC
  workflow_dispatch: {}

jobs:
  flag:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();

            const issues = await github.paginate(
              github.rest.issues.listForRepo, { ...context.repo, state: "open", per_page: 100 }
            );

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const due = issue.milestone && issue.milestone.due_on ? new Date(issue.milestone.due_on) : null;
              const overdue = due !== null && due < now;

              const has = (issue.labels || []).some(l => (l.name || l) === "overdue");
              if (overdue && !has) {
                await github.rest.issues.addLabels({ ...context.repo, issue_number: issue.number, labels: ["overdue"] });
              } else if (!overdue && has) {
                await github.rest.issues.removeLabel({ ...context.repo, issue_number: issue.number, name: "overdue" }).catch(() => {});
              }
            }
