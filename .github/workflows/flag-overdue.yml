# Flags overdue issues: the milestone (YY.MM) due date has passed but the issue is still open.
# Runs once a day on a schedule (and manually via the button).
name: Flag overdue issues

on:
  schedule:
    - cron: "0 6 * * *"     # every day at 06:00 UTC
  workflow_dispatch: {}      # allows manual runs from the Actions tab

jobs:
  flag:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();

            // fetch all open issues (paginated)
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { ...context.repo, state: "open", per_page: 100 }
            );

            for (const issue of issues) {
              if (issue.pull_request) continue;            // skip PRs

              const due = issue.milestone && issue.milestone.due_on
                ? new Date(issue.milestone.due_on) : null;
              const overdue = due !== null && due < now;   // milestone due date passed

              const has = (issue.labels || []).some(l => (l.name || l) === "overdue");

              if (overdue && !has) {
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number: issue.number, labels: ["overdue"],
                });
              } else if (!overdue && has) {
                await github.rest.issues.removeLabel({
                  ...context.repo, issue_number: issue.number, name: "overdue",
                }).catch(() => {});
              }
            }
