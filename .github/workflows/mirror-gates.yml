# Mirror bot: gate checkboxes in a Feature body -> single-select fields on the project card.
# Project-agnostic: for every project the issue belongs to, it finds the gate fields BY NAME
# (Specs / Architect / Dev / QA) and sets them to "Passed" when the matching box is ticked.
# - Unchecking clears the field ONLY if it was "Passed" (a manually-set "N/A" is preserved).
# - On every transition it posts an attributed comment, so the timeline shows who + when.
# Needs a token with project write access, provided as the PROJECTS_TOKEN secret
# (repo-level today; drop-in replaceable by an org secret / GitHub App later — same name).
name: Mirror gate checkboxes to project fields

on:
  issues:
    types: [opened, edited]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";
            const actor = context.payload.sender ? context.payload.sender.login : "unknown";

            // checklist line (substring match) -> project field name + human-readable name.
            // "specs" also matches the legacy text "Requirements approved" (back-compat).
            const gates = [
              { match: /specs approved|requirements approved/i, field: "Specs",     name: "Specs" },
              { match: /architecture review passed/i,           field: "Architect", name: "Architecture review" },
              { match: /development complete/i,                 field: "Dev",       name: "Development" },
              { match: /qa passed/i,                            field: "QA",        name: "QA" },
            ];

            const lines = body.split("\n");
            // ticked = a line like "- [x] ... <gate text>"
            const isChecked = (re) =>
              lines.some(l => /^\s*-\s*\[[xX]\]/.test(l) && re.test(l));

            // find every project the issue is on, with each project's fields + current values
            const data = await github.graphql(`
              query($id:ID!){
                node(id:$id){ ... on Issue {
                  projectItems(first:20){ nodes {
                    id
                    project { id
                      fields(first:50){ nodes {
                        ... on ProjectV2SingleSelectField { id name options { id name } }
                      } }
                    }
                    fieldValues(first:50){ nodes {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name field { ... on ProjectV2SingleSelectField { name } }
                      }
                    } }
                  } }
                } }
              }`, { id: issue.node_id });

            const items = (data.node && data.node.projectItems && data.node.projectItems.nodes) || [];

            const comment = (text) =>
              github.rest.issues.createComment({
                ...context.repo, issue_number: issue.number, body: text,
              });

            for (const item of items) {
              const proj = item.project;
              const fieldDefs = proj.fields.nodes.filter(f => f && f.name);

              // current single-select value per field name ("Passed" | "N/A" | undefined)
              const curr = {};
              for (const v of item.fieldValues.nodes) {
                if (v && v.field && v.name) curr[v.field.name] = v.name;
              }

              for (const g of gates) {
                const def = fieldDefs.find(f => f.name === g.field);
                if (!def) continue;                        // project lacks this gate field -> skip
                const passed = def.options.find(o => o.name === "Passed");
                if (!passed) continue;

                const want    = isChecked(g.match);
                const current = curr[g.field];

                if (want && current !== "Passed") {
                  await github.graphql(`
                    mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){
                      updateProjectV2ItemFieldValue(input:{
                        projectId:$p, itemId:$i, fieldId:$f, value:{ singleSelectOptionId:$o }
                      }){ clientMutationId }
                    }`, { p: proj.id, i: item.id, f: def.id, o: passed.id });
                  await comment(`✅ Gate **${g.name}** passed — by @${actor}`);
                } else if (!want && current === "Passed") {
                  // clear only when it was "Passed" -- never wipe a manual "N/A"
                  await github.graphql(`
                    mutation($p:ID!,$i:ID!,$f:ID!){
                      clearProjectV2ItemFieldValue(input:{
                        projectId:$p, itemId:$i, fieldId:$f
                      }){ clientMutationId }
                    }`, { p: proj.id, i: item.id, f: def.id });
                  await comment(`⚪ Gate **${g.name}** unchecked — by @${actor}`);
                }
              }
            }
