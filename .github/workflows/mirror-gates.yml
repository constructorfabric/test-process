# Mirror bot: gate checkboxes in a Feature body -> single-select fields on the project card.
# Project-agnostic: for every project the issue belongs to, it finds the gate fields BY NAME
# (Specs / Architect / Dev / QA) and sets them to "Passed" when the matching box is ticked,
# or clears them when it is unticked. Gates are binary -- there is no "N/A"; if a gate does
# not apply (e.g. no architecture review needed), just tick it as passed.
# - On every transition it posts an attributed comment, so the timeline shows who + when.
#
# Two tokens on purpose:
#   * PROJECTS_TOKEN (a PAT) writes the project fields -- the default GITHUB_TOKEN cannot.
#   * the default GITHUB_TOKEN posts the comments, so their author is github-actions[bot]
#     (not the PAT owner). The human who toggled the gate is named in the comment text.
name: Mirror gate checkboxes to project fields

on:
  issues:
    types: [opened, edited]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write          # lets the default GITHUB_TOKEN post comments as the bot
    steps:
      - uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # bot token, used only for comments
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}   # PAT, used for project field writes
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";
            const actor = context.payload.sender ? context.payload.sender.login : "unknown";

            // comments go through the default bot token so the author is github-actions[bot]
            // second client on the default token so comments are authored by github-actions[bot].
            // (github-script can't `require('@actions/github')`; reuse the running client's class.)
            let bot;
            try { bot = new (github.constructor)({ auth: process.env.GH_TOKEN }); }
            catch (e) { bot = github; }   // fall back to the PAT client rather than break field writes
            const comment = (text) =>
              bot.rest.issues.createComment({
                ...context.repo, issue_number: issue.number, body: text,
              });

            // checklist line (substring match) -> project field name + human-readable name.
            // "specs" also matches the legacy text "Requirements approved" (back-compat).
            const gates = [
              { match: /specifications accepted|specs approved|requirements approved/i, field: "Specs",         name: "Specifications" },
              { match: /architecture design passed|architecture review passed/i,        field: "Architecture",  name: "Architecture design" },
              { match: /development done|development complete/i,                        field: "Dev",           name: "Development" },
              { match: /testing done|qa passed/i,                                       field: "Testing",       name: "Testing" },
              { match: /release notes accepted/i,                                       field: "Release notes", name: "Release notes" },
            ];

            const lines = body.split("\n");
            // ticked = a line like "- [x] ... <gate text>"
            const isChecked = (re) =>
              lines.some(l => /^\s*-\s*\[[xX]\]/.test(l) && re.test(l));

            // find every project the issue is on, with each project's fields + current values
            const data = await github.graphql(`
              query($id:ID!){
                node(id:$id){ ... on Issue {
                  projectItems(first:20){ nodes {
                    id
                    project { id
                      fields(first:50){ nodes {
                        ... on ProjectV2SingleSelectField { id name options { id name } }
                      } }
                    }
                    fieldValues(first:50){ nodes {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name field { ... on ProjectV2SingleSelectField { name } }
                      }
                    } }
                  } }
                } }
              }`, { id: issue.node_id });

            const items = (data.node && data.node.projectItems && data.node.projectItems.nodes) || [];

            for (const item of items) {
              const proj = item.project;
              const fieldDefs = proj.fields.nodes.filter(f => f && f.name);

              // current single-select value per field name ("Passed" | "N/A" | undefined)
              const curr = {};
              for (const v of item.fieldValues.nodes) {
                if (v && v.field && v.name) curr[v.field.name] = v.name;
              }

              for (const g of gates) {
                const def = fieldDefs.find(f => f.name === g.field);
                if (!def) continue;                        // project lacks this gate field -> skip
                const passed = def.options.find(o => o.name === "Passed");
                if (!passed) continue;

                const want    = isChecked(g.match);
                const current = curr[g.field];

                if (want && current !== "Passed") {
                  await github.graphql(`
                    mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){
                      updateProjectV2ItemFieldValue(input:{
                        projectId:$p, itemId:$i, fieldId:$f, value:{ singleSelectOptionId:$o }
                      }){ clientMutationId }
                    }`, { p: proj.id, i: item.id, f: def.id, o: passed.id });
                  await comment(`✅ Gate **${g.name}** passed — by @${actor}`);
                } else if (!want && current) {
                  // box unticked but the field still has a value -> clear it
                  await github.graphql(`
                    mutation($p:ID!,$i:ID!,$f:ID!){
                      clearProjectV2ItemFieldValue(input:{
                        projectId:$p, itemId:$i, fieldId:$f
                      }){ clientMutationId }
                    }`, { p: proj.id, i: item.id, f: def.id });
                  await comment(`⚪ Gate **${g.name}** unchecked — by @${actor}`);
                }
              }
            }
