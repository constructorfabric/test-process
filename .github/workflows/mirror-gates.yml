# Бот-зеркало: галочки гейтов в теле issue → метки (чтобы доска могла фильтровать).
# Срабатывает при создании/редактировании issue.
name: Mirror gate checkboxes to labels

on:
  issues:
    types: [opened, edited]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write          # боту нужно право вешать/снимать метки
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            // строка чек-листа (по подстроке) -> метка, которую ставим когда отмечено [x]
            const gates = [
              { match: /requirements approved/i, label: "reqs-approved" },
              { match: /architecture review passed/i, label: "arch-passed" },
              { match: /qa passed/i,               label: "qa-passed"   },
            ];

            const lines = body.split("\n");
            // отмечено = строка вида "- [x] ... <текст гейта>"
            const isChecked = (re) =>
              lines.some(l => /^\s*-\s*\[[xX]\]/.test(l) && re.test(l));

            const current = new Set((issue.labels || []).map(l => l.name || l));

            for (const g of gates) {
              const want = isChecked(g.match);
              const has  = current.has(g.label);
              if (want && !has) {
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number: issue.number, labels: [g.label],
                });
              } else if (!want && has) {
                await github.rest.issues.removeLabel({
                  ...context.repo, issue_number: issue.number, name: g.label,
                }).catch(() => {});   // метки могло уже не быть — не падаем
              }
            }
