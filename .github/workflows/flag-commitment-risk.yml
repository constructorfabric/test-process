# Flags a broken planning promise: Commitment = Committed but the milestone is missing or overdue.
# The milestone is derived from Release (sync-milestone-from-release.yml), so this reads the native
# milestone due date again. Two tokens: PROJECTS_TOKEN reads Commitment; GITHUB_TOKEN labels as the bot.
name: Flag commitment risk

on:
  schedule:
    - cron: "30 5 * * *"    # daily 05:30 UTC
  workflow_dispatch: {}

jobs:
  flag:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            // second client on the default token so label ops are authored by github-actions[bot].
            let bot;
            try { bot = new (github.constructor)({ auth: process.env.GH_TOKEN }); }
            catch (e) { bot = github; }

            const now = new Date();
            const RISK = "commitment-risk";

            const issues = await github.paginate(
              github.rest.issues.listForRepo, { ...context.repo, state: "open", per_page: 100 }
            );

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const due = issue.milestone && issue.milestone.due_on ? new Date(issue.milestone.due_on) : null;
              const milestoneBad = (issue.milestone == null) || (due !== null && due < now);

              const data = await github.graphql(`
                query($id:ID!){ node(id:$id){ ... on Issue {
                  projectItems(first:20){ nodes {
                    fieldValueByName(name:"Commitment"){ ... on ProjectV2ItemFieldSingleSelectValue { name } }
                  } }
                } } }`, { id: issue.node_id });

              const items = (data.node && data.node.projectItems && data.node.projectItems.nodes) || [];
              const committed = items.some(it => it.fieldValueByName && it.fieldValueByName.name === "Committed");

              const risk = committed && milestoneBad;
              const has = (issue.labels || []).some(l => (l.name || l) === RISK);
              if (risk && !has) {
                await bot.rest.issues.addLabels({ ...context.repo, issue_number: issue.number, labels: [RISK] });
              } else if (!risk && has) {
                await bot.rest.issues.removeLabel({ ...context.repo, issue_number: issue.number, name: RISK }).catch(() => {});
              }
            }
