# Flags a broken planning promise: an issue whose project "Commitment" = Committed but whose
# "Target date" is missing or already passed. A Committed item must carry a live date --
# this detects (not prevents) the cases where it doesn't. Adds/removes the commitment-risk label.
# (Re-based off native milestone onto the Target date field, which is derived from Release.)
#
# Two tokens: PROJECTS_TOKEN reads project fields; GITHUB_TOKEN labels as github-actions[bot].
name: Flag commitment risk

on:
  schedule:
    - cron: "30 5 * * *"    # daily 05:30 UTC
  workflow_dispatch: {}

jobs:
  flag:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            // second client on the default token so label ops are authored by github-actions[bot].
            let bot;
            try { bot = new (github.constructor)({ auth: process.env.GH_TOKEN }); }
            catch (e) { bot = github; }

            const today = new Date(); today.setUTCHours(0, 0, 0, 0);
            const RISK = "commitment-risk";

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { ...context.repo, state: "open", per_page: 100 }
            );

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const data = await github.graphql(`
                query($id:ID!){ node(id:$id){ ... on Issue {
                  projectItems(first:20){ nodes { fieldValues(first:50){ nodes {
                    ... on ProjectV2ItemFieldSingleSelectValue { name field { ... on ProjectV2FieldCommon { name } } }
                    ... on ProjectV2ItemFieldDateValue { date field { ... on ProjectV2FieldCommon { name } } }
                  } } } }
                } } }`, { id: issue.node_id });

              const items = (data.node && data.node.projectItems && data.node.projectItems.nodes) || [];
              const risk = items.some(it => {
                let committed = false, target = null;
                for (const v of it.fieldValues.nodes) {
                  if (!v || !v.field) continue;
                  if (v.field.name === "Commitment" && v.name === "Committed") committed = true;
                  if (v.field.name === "Target date" && v.date) target = v.date.slice(0, 10);
                }
                return committed && (!target || new Date(target) < today);
              });

              const has = (issue.labels || []).some(l => (l.name || l) === RISK);
              if (risk && !has) {
                await bot.rest.issues.addLabels({ ...context.repo, issue_number: issue.number, labels: [RISK] });
              } else if (!risk && has) {
                await bot.rest.issues.removeLabel({ ...context.repo, issue_number: issue.number, name: RISK }).catch(() => {});
              }
            }
